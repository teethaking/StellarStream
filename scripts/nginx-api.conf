# =============================================================================
# Nginx config — StellarStream API (api.stellarstream.io)
# Place at: /etc/nginx/sites-available/stellarstream-api
# Enable:   ln -s /etc/nginx/sites-available/stellarstream-api /etc/nginx/sites-enabled/
# =============================================================================

# Rate limiting zones
limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Redirect HTTP → HTTPS (Certbot will manage this block)
server {
    listen 80;
    server_name api.stellarstream.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.stellarstream.io;

    # ── SSL (managed by Certbot) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.stellarstream.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stellarstream.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"                    always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # Hide Nginx version
    server_tokens off;

    # ── Rate limiting ─────────────────────────────────────────────────────
    limit_req  zone=api_limit burst=60 nodelay;
    limit_conn zone=conn_limit 20;

    # ── Proxy to Node API (port 3000) ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # WebSocket support
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Don't expose upstream errors
        proxy_intercept_errors on;
    }

    # Block common exploit paths
    location ~* \.(env|git|sql|bak|log)$ {
        deny all;
        return 404;
    }

    # Health check — no rate limit
    location /health {
        limit_req off;
        proxy_pass http://127.0.0.1:3000/health;
    }

    # Logging
    access_log /var/log/nginx/stellarstream-api.access.log;
    error_log  /var/log/nginx/stellarstream-api.error.log warn;
}
